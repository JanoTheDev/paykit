name: Anchor Test

# Runs Rust unit tests on every PR touching solana-program. Full
# `anchor build` + integration tests require the Solana CLI, which installs
# from release.solana.com — that endpoint is intermittently unreachable
# from GitHub runners. The heavier end-to-end suite runs locally:
#
#   cd packages/solana-program && anchor build && anchor test
#
# Once we move to self-hosted runners or the anza-xyz/agave release flow
# stabilizes, re-add the build job.

on:
  pull_request:
    paths:
      - "packages/solana-program/**"
      - ".github/workflows/anchor-test.yml"
  push:
    branches: [master]
    paths:
      - "packages/solana-program/**"
      - ".github/workflows/anchor-test.yml"

concurrency:
  group: anchor-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: Rust unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/solana-program

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/solana-program/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/solana-program/**/Cargo.lock', 'packages/solana-program/**/Cargo.toml') }}

      - name: cargo test (workspace)
        run: cargo test --workspace --all-features

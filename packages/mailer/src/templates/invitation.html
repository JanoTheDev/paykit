<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>You've been invited to {{teamName}} on Paylix</title>
  </head>
  <body style="margin:0;padding:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:#0f172a;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="520" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;padding:32px;">
            <tr>
              <td style="font-size:14px;color:#64748b;padding-bottom:8px;">Paylix</td>
            </tr>
            <tr>
              <td style="font-size:22px;font-weight:600;padding-bottom:16px;">You've been invited to join {{teamName}}</td>
            </tr>
            <tr>
              <td style="font-size:15px;line-height:1.6;color:#334155;padding-bottom:24px;">
                {{inviterName}} ({{inviterEmail}}) invited you to join the team <strong>{{teamName}}</strong> on Paylix.
              </td>
            </tr>
            <tr>
              <td style="padding-bottom:24px;">
                <a href="{{acceptUrl}}" style="display:inline-block;background:#06d6a0;color:#07070a;text-decoration:none;padding:12px 20px;border-radius:8px;font-weight:600;">Accept invitation</a>
              </td>
            </tr>
            <tr>
              <td style="font-size:13px;color:#64748b;padding-bottom:8px;">
                This invitation expires on {{expiresAt}}.
              </td>
            </tr>
            <tr>
              <td style="font-size:12px;color:#94a3b8;word-break:break-all;">
                If the button doesn't work, paste this link into your browser:<br />
                {{acceptUrl}}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
